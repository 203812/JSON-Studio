<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" width="1200" height="360" role="img" aria-label="JSON Studio">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2B2C25"/>
      <stop offset="1" stop-color="#1E1F1C"/>
    </linearGradient>
    <linearGradient id="sweep" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#F92672"/>
      <stop offset="0.5" stop-color="#A6E22E"/>
      <stop offset="1" stop-color="#AE81FF"/>
    </linearGradient>
  </defs>

  <rect x="2" y="2" width="1196" height="356" rx="36" fill="url(#bg)"/>
  <rect x="2" y="2" width="1196" height="356" rx="36" fill="none" stroke="#000000" stroke-opacity="0.35" stroke-width="2"/>

  <!-- Logo mark. Base state is the finished look, so a viewer that ignores
       SMIL still shows a complete banner; animation draws toward that state. -->
  <g transform="translate(90 60) scale(0.46)">
    <rect x="16" y="16" width="480" height="480" rx="112" fill="#272822"/>
    <g fill="none" stroke="#F92672" stroke-width="34" stroke-linecap="round" stroke-linejoin="round"
       pathLength="100" stroke-dasharray="100" stroke-dashoffset="0">
      <path d="M 200 150 C 160 150 160 208 160 230 C 160 248 150 256 132 256 C 150 256 160 264 160 282 C 160 304 160 362 200 362">
        <animate attributeName="stroke-dashoffset" from="100" to="0" dur="1.1s" begin="0s" fill="freeze"/>
      </path>
      <path d="M 312 150 C 352 150 352 208 352 230 C 352 248 362 256 380 256 C 362 256 352 264 352 282 C 352 304 352 362 312 362">
        <animate attributeName="stroke-dashoffset" from="100" to="0" dur="1.1s" begin="0s" fill="freeze"/>
      </path>
    </g>
    <circle cx="256" cy="256" r="26" fill="#A6E22E">
      <animate attributeName="r" values="26;30;26" dur="2.4s" begin="0s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Wordmark, animated accent underline (base = full width), blinking caret. -->
  <text x="330" y="175" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="92" font-weight="800"
        fill="#F8F8F2" letter-spacing="-2">JSON Studio</text>

  <rect x="332" y="205" width="560" height="7" rx="3.5" fill="url(#sweep)">
    <animate attributeName="width" from="0" to="560" dur="1s" begin="0s" fill="freeze"/>
  </rect>

  <rect x="905" y="108" width="10" height="74" fill="#A6E22E">
    <animate attributeName="opacity" values="1;1;0;0" dur="1.1s" repeatCount="indefinite"/>
  </rect>

  <text x="332" y="270" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="34" font-weight="500"
        fill="#A8A79A">Meer dan een formatter.</text>
  <text x="332" y="315" font-family="Consolas, 'Courier New', monospace" font-size="23"
        fill="#75715E">JSON &#183; YAML &#183; format &#183; validate &#183; vergelijk</text>
</svg>
